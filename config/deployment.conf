########################################
# Project
########################################

PROJECT_NAME=MSAR

PROJECT_ROOT=/opt/msar

########################################
# Docker
########################################

COMPOSE_FILE=compose/docker-compose.yml

COMPOSE_PROD_FILE=compose/docker-compose.prod.yml

########################################
# Images
########################################

BACKEND_IMAGE=ghcr.io/khalid-786/msar-api

FRONTEND_IMAGE=ghcr.io/khalid-786/msar-frontend

########################################
# Health

########################################

API_HEALTH=http://localhost:5080/health

FRONTEND_HEALTH=http://localhost

########################################
# Logs

########################################

LOG_DIRECTORY=logs

########################################
# Backup

########################################

BACKUP_DIRECTORY=backup

########################################
# Release

########################################

RELEASE_DIRECTORY=releases
########################################
# Registry
########################################

REGISTRY=ghcr.io

GHCR_USERNAME=${GHCR_USERNAME}

GHCR_TOKEN=${GHCR_TOKEN}

########################################
# Docker

########################################

COMPOSE="docker compose --env-file env/.env.production -f compose/docker-compose.yml -f compose/docker-compose.prod.yml"

########################################
# Timeouts

########################################

PULL_TIMEOUT=600

START_TIMEOUT=180

HEALTH_TIMEOUT=120