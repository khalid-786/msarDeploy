services:

  ############################################################
  # SQL Server
  ############################################################

  sqlserver:

    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: msar-sql

    restart: unless-stopped

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SA_PASSWORD}

    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$SA_PASSWORD -C -Q 'SELECT 1' || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10

    networks:
      - msar-network

  ############################################################
  # RabbitMQ
  ############################################################

  rabbitmq:

    image: rabbitmq:3-management

    container_name: msar-rabbit

    restart: unless-stopped

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbit_data:/var/lib/rabbitmq

    networks:
      - msar-network

  ############################################################
  # Backend
  ############################################################

  backend:

    image: ${BACKEND_IMAGE}

    container_name: msar-api

    restart: unless-stopped

    env_file:
      - /root/msar/config/.env.production

    ports:
      - "5080:80"

    depends_on:

      sqlserver:
        condition: service_healthy

      rabbitmq:
        condition: service_started

    networks:
      - msar-network

  ############################################################
  # Frontend
  ############################################################

  frontend:

    image: ${FRONTEND_IMAGE}

    container_name: msar-frontend

    restart: unless-stopped

    depends_on:

      backend:
        condition: service_started

    ports:
      - "80:80"

    networks:
      - msar-network

############################################################
# Networks
############################################################

networks:

  msar-network:

    driver: bridge

############################################################
# Volumes
############################################################

volumes:

  sql_data:

  rabbit_data: