services:

  ############################################################
  # Backend Blue
  ############################################################

  backend-blue:

    image: ${BACKEND_IMAGE}

    container_name: msar-api-blue

    restart: unless-stopped

    env_file:
      - /root/msar/config/.env.production

    expose:
      - "80"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - msar-network

  ############################################################
  # Frontend Blue
  ############################################################

  frontend-blue:

    image: ${FRONTEND_IMAGE}

    container_name: msar-frontend-blue

    restart: unless-stopped

    depends_on:

      backend-blue:
        condition: service_healthy

    expose:
      - "80"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - msar-network

############################################################
# Networks
############################################################

networks:

  msar-network:
    name: msar-network
    external: true