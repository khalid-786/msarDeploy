services:

####################################################
# Prometheus
####################################################

  prometheus:

    image: prom/prometheus:${PROMETHEUS_VERSION}

    container_name: prometheus

    restart: always

    ports:

      - "9090:9090"

    command:

      - "--config.file=/etc/prometheus/prometheus.yml"

      - "--storage.tsdb.path=/prometheus"

      - "--storage.tsdb.retention.time=30d"

      - "--web.enable-lifecycle"

    volumes:

      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      - ../monitoring/prometheus/rules:/etc/prometheus/rules:ro

      - ../storage/prometheus:/prometheus

    healthcheck:

      test: ["CMD","wget","--spider","-q","http://localhost:9090/-/healthy"]

      interval: 30s

      timeout: 10s

      retries: 5

    logging:

      driver: json-file

      options:

        max-size: "20m"

        max-file: "5"

    networks:

      - msar-network

####################################################
# Grafana
####################################################

  grafana:

    image: grafana/grafana:${GRAFANA_VERSION}

    container_name: grafana

    restart: always

    ports:

      - "3000:3000"

    environment:

      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}

      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}

    volumes:

      - ../storage/grafana:/var/lib/grafana

      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning

      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards

    depends_on:

      prometheus:

        condition: service_healthy

    logging:

      driver: json-file

      options:

        max-size: "20m"

        max-file: "5"

    networks:

      - msar-network

####################################################
# Node Exporter
####################################################

  node-exporter:

    image: prom/node-exporter:${NODE_EXPORTER_VERSION}

    container_name: node-exporter

    restart: always

    pid: host

    volumes:

      - /proc:/host/proc:ro

      - /sys:/host/sys:ro

      - /:/rootfs:ro

    command:

      - "--path.procfs=/host/proc"

      - "--path.rootfs=/rootfs"

      - "--path.sysfs=/host/sys"

    networks:

      - msar-network

####################################################
# cAdvisor
####################################################

  cadvisor:

    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION}

    container_name: cadvisor

    restart: always

    privileged: true

    ports:

      - "8088:8080"

    volumes:

      - /:/rootfs:ro

      - /var/run:/var/run:rw

      - /sys:/sys:ro

      - /var/lib/docker:/var/lib/docker:ro

      - /dev/disk:/dev/disk:ro

    command:

      - "--docker_only=true"

      - "--housekeeping_interval=30s"

    networks:

      - msar-network

####################################################
# Loki
####################################################

  loki:

    image: grafana/loki:3.5.3

    container_name: loki

    restart: always

    command:

      - "-config.file=/etc/loki/loki-config.yml"

    volumes:

      - ../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro

      - ../storage/loki:/loki

    ports:

      - "3100:3100"

    networks:

      - msar-network

####################################################
# Promtail
####################################################

  promtail:

    image: grafana/promtail:3.5.3

    container_name: promtail

    restart: always

    command:

      - "-config.file=/etc/promtail/promtail-config.yml"

    volumes:

      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro

      - /var/lib/docker/containers:/var/lib/docker/containers:ro

      - /var/run/docker.sock:/var/run/docker.sock:ro

      - /etc/machine-id:/etc/machine-id:ro

    depends_on:

      loki:

        condition: service_started

    networks:

      - msar-network

####################################################
# Alertmanager
####################################################

  alertmanager:

    image: prom/alertmanager:v0.28.1

    container_name: alertmanager

    restart: always

    command:

      - "--config.file=/etc/alertmanager/alertmanager.yml"

      - "--storage.path=/alertmanager"

    ports:

      - "9093:9093"

    volumes:

      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

      - ../storage/alertmanager:/alertmanager

    networks:

      - msar-network

####################################################
# RabbitMQ Exporter
####################################################

  rabbitmq-exporter:

    image: kbudde/rabbitmq-exporter:v1.0.0

    container_name: rabbitmq-exporter

    restart: always

    environment:

      RABBIT_URL: http://rabbitmq:15672

      RABBIT_USER: ${RABBITMQ_DEFAULT_USER}

      RABBIT_PASSWORD: ${RABBITMQ_DEFAULT_PASS}

    ports:

      - "9419:9419"

    depends_on:

      rabbitmq:

        condition: service_started

    networks:

      - msar-network

####################################################
# Networks
####################################################

networks:

  msar-network:

    name: msar-network

    external: true