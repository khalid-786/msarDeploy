global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:

  ########################################################
  # Prometheus
  ########################################################

  - job_name: prometheus

    static_configs:
      - targets:
          - prometheus:9090

  ########################################################
  # Node Exporter
  ########################################################

  - job_name: node-exporter

    static_configs:
      - targets:
          - node-exporter:9100

  ########################################################
  # cAdvisor
  ########################################################

  - job_name: cadvisor

    static_configs:
      - targets:
          - cadvisor:8080

  ########################################################
  # Backend API
  ########################################################

  - job_name: msar-api

    metrics_path: /metrics

    static_configs:
      - targets:
          - msar-api:80

  ########################################################
  # RabbitMQ
  ########################################################

  - job_name: rabbitmq

    metrics_path: /metrics

    static_configs:
      - targets:
          - msar-rabbit:15692